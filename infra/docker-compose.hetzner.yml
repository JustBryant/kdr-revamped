version: '3.8'
services:
  web:
    build:
      context: ../
      dockerfile: infra/Dockerfile.prod
    env_file: ../.env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - kdr-net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: kdr
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: kdr
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - kdr-net

  redis:
    image: redis:7
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - kdr-net

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - kdr-net

volumes:
  pgdata:
  redisdata:
  certs:

networks:
  kdr-net:
    driver: bridge
