user  nginx;
worker_processes  auto;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout  65;
  gzip  on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_comp_level 5;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Redirect to HTTPS (optional if you front with Cloudflare)
    location / {
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering on;
      proxy_buffers 8 16k;
      proxy_busy_buffers_size 32k;
      proxy_pass http://web:3000;
    }

    # Cache static assets aggressively
    location ~* \.(?:jpg|jpeg|gif|png|ico|css|js|svg|webp|avif)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri $uri/ =404;
    }

    # Short caching hints for dynamic JSON where short staleness ok
    location ~* ^/api/kdr/ {
      proxy_pass http://web:3000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_pragma;
      add_header Cache-Control "public, max-age=3, stale-while-revalidate=10";
    }
  }
}
