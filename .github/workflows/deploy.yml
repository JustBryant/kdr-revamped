name: Deploy to Hetzner

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner connectivity debug
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          echo "Runner public IP:"
          curl -sS https://ifconfig.co || curl -sS https://ipinfo.io/ip || curl -sS https://icanhazip.com || dig +short myip.opendns.com @resolver1.opendns.com || true
          echo "Testing TCP connect to ${DEPLOY_HOST:-204.168.138.6} on port ${DEPLOY_PORT:-22}"
          if timeout 8 bash -c "cat < /dev/tcp/${DEPLOY_HOST:-204.168.138.6}/${DEPLOY_PORT:-22}" >/dev/null 2>&1; then
            echo CONNECT_OK
          else
            echo CONNECT_FAIL
          fi

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          timeout: 120s
          script: |
            set -e
            cd /home/deploy/kdr || exit 1
            git fetch --all --prune
            git reset --hard origin/main
            docker compose -f infra/docker-compose.hetzner.yml pull --ignore-pull-failures
            docker compose -f infra/docker-compose.hetzner.yml up -d --build web
            echo "Deploy finished"
